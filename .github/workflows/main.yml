name: Build AutostrongSharp GUI

on:
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: 10.0.x

  - name: Publish GUI
    run: dotnet publish AutostrongSharpWpf/AutostrongSharpWpf.csproj -c Release -r win-x64 --self-contained true

  - name: Upload build
    uses: actions/upload-artifact@v4
    with:
      name: AutostrongSharpGUI
      path: AutostrongSharpWpf/bin/Release/net10.0-windows/win-x64/publish
```
